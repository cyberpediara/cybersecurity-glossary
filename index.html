<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Cyber Glossary</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--bg:#06140d;--bg2:#0b2418;--card:#10281c;--card2:#143823;--text:#f5fff8;--muted:#c9d8cf;--border:#2f6b49;--accent:#22c55e;--accent2:#86efac;--base-font:18px}
.light{--bg:#f7fff9;--bg2:#eefcf3;--card:#fff;--card2:#f5fff8;--text:#0b1f13;--muted:#26352b;--border:#9fd8b3;--accent:#15803d;--accent2:#166534}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);font-size:var(--base-font);line-height:1.8}
.topbar{position:sticky;top:0;z-index:1000;background:rgba(6,20,13,.88);border-bottom:1px solid var(--border)}
.nav{max-width:1200px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-weight:bold;color:var(--accent2);font-size:22px}
.tools{display:flex;gap:8px;flex-wrap:wrap}
button,.main-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#052e13;border:none;padding:13px 20px;border-radius:14px;cursor:pointer;font-weight:bold;text-decoration:none;display:inline-block}
.hero,.section{max-width:1100px;margin:30px auto;padding:35px 25px;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:30px}
.hero{text-align:center}
.hero h1{font-size:42px;color:var(--accent2);margin:0}
.hero p{color:var(--muted);font-size:21px}
.container{max-width:1100px;margin:auto;padding:0 20px}
.section h2{color:var(--accent2);margin-top:0}
.ai-box,.controls{display:flex;gap:14px;flex-wrap:wrap}
input,select{flex:1;min-width:230px;padding:16px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:18px}
#aiAnswer{background:rgba(255,255,255,.06);padding:18px;border-radius:16px}
.alphabet-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px}
.letter-btn{min-width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--card),var(--card2));color:var(--text);border:1px solid var(--border)}
.light .topbar,.light .hero,.light .section{background:#fff!important;color:#0b1f13}
.light .hero p,.light #aiAnswer{color:#26352b}
.light input,.light select{background:#fff;color:#0b1f13}
</style>
</head>

<body>

<div class="topbar">
  <div class="nav">
    <div class="logo">🛡️ Cyber Glossary</div>
    <div class="tools">
      <a class="main-btn" href="about.html" id="aboutBtn">عن المشروع</a>
      <button onclick="toggleLanguage()" id="langBtn">English</button>
      <button onclick="toggleTheme()" id="themeBtn">🌙 الوضع</button>
      <button onclick="increaseFont()">A+</button>
      <button onclick="decreaseFont()">A-</button>
    </div>
  </div>
</div>

<section class="hero">
  <h1 id="mainTitle">القاموس السيبراني التفاعلي</h1>
  <p id="mainSubtitle">منصة تعليمية لفهم مصطلحات الأمن السيبراني من خلال البحث، الأمثلة، الحلول، والمساعد الذكي.</p>
  <br>
  <a class="main-btn" href="terms.html" id="termsBtn">عرض جميع المصطلحات</a>
</section>

<div class="container">

  <div class="section">
    <h2 id="aiTitle">🧠 المساعد الذكي</h2>
    <div class="ai-box">
      <input id="aiQuestion" type="text" placeholder="اكتب كلمة فقط مثل: فيروس أو Phishing">
      <button onclick="askAI()" id="sendBtn">إرسال</button>
    </div>
    <p id="aiAnswer">اكتب المصطلح وسيتم شرحه تلقائيًا.</p>
  </div>

  <div class="section">
    <h2 id="quickSearchTitle">🔍 البحث السريع</h2>
    <div class="controls">
      <input id="searchInput" type="text" placeholder="ابحث عن مصطلح...">
      <select id="categoryFilter"><option value="">كل الفئات</option></select>
      <select id="levelFilter"><option value="">كل المستويات</option></select>
      <button onclick="goToTerms()" id="searchBtn">بحث</button>
    </div>
    <div class="alphabet-bar" id="alphabetBar"></div>
  </div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwEZR2hd5RJYdmk2mVGLgQjbVpc-28v_Gabhcuk4zvit7tspvyHYJgbrN1UcN0jqGoX/exec";
const N8N_WEBHOOK_URL="https://buth.app.n8n.cloud/webhook/ask-ai";

let allTerms=[],fontSize=18,currentLang="ar";

const T={
ar:{dir:"rtl",lang:"ar",langBtn:"English",about:"عن المشروع",theme:"🌙 الوضع",title:"القاموس السيبراني التفاعلي",sub:"منصة تعليمية لفهم مصطلحات الأمن السيبراني من خلال البحث، الأمثلة، الحلول، والمساعد الذكي.",terms:"عرض جميع المصطلحات",ai:"🧠 المساعد الذكي",aiPH:"اكتب كلمة فقط مثل: فيروس أو Phishing",send:"إرسال",aiDefault:"اكتب المصطلح وسيتم شرحه تلقائيًا.",quick:"🔍 البحث السريع",searchPH:"ابحث عن مصطلح...",allCat:"كل الفئات",allLvl:"كل المستويات",search:"بحث",askFirst:"اكتب كلمة أولاً.",processing:"جاري المعالجة...",failAI:"تعذر الاتصال بالمساعد الذكي."},
en:{dir:"ltr",lang:"en",langBtn:"العربية",about:"About",theme:"🌙 Theme",title:"Interactive Cybersecurity Glossary",sub:"An educational platform for understanding cybersecurity terms through search, examples, solutions, and a smart assistant.",terms:"View All Terms",ai:"🧠 Smart AI Assistant",aiPH:"Type one word, such as Malware or Phishing",send:"Send",aiDefault:"Type a term and it will be explained automatically.",quick:"🔍 Quick Search",searchPH:"Search for a term...",allCat:"All Categories",allLvl:"All Levels",search:"Search",askFirst:"Please type a word first.",processing:"Processing...",failAI:"Unable to connect to the Smart Assistant."}
};

function levelToArabic(level){return level==="beginner"?"للمبتدئين":level==="intermediate"?"خبرة متوسطة":level==="advanced"?"خبرة متقدمة":level}
async function askAI(){
  const q=document.getElementById("aiQuestion").value.trim(),box=document.getElementById("aiAnswer"),L=T[currentLang];
  if(!q){box.innerText=L.askFirst;return}
  box.innerText=L.processing;
  const smartPrompt=currentLang==="ar"
  ?`عرّف هذا المصطلح في الأمن السيبراني بشكل مبسط وبالعربية، ثم أعط مثالًا وحلًا مختصرًا إن وجد: ${q}`
  :`Define this cybersecurity term in simple English, then give a short example and a brief solution if applicable: ${q}`;
  try{
    const response=await fetch(N8N_WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:smartPrompt,question:smartPrompt,query:q})});
    const data=await response.json();
    box.innerText=data.reply||data.answer||data.message||data.text||data.output||JSON.stringify(data);
  }catch{box.innerText=L.failAI}
}
async function loadFilters(){
  const res=await fetch(API_URL),data=await res.json();
  allTerms=Array.isArray(data)?data:data.data;
  populateFilters();createAlphabetBar();
}
function populateFilters(){
  const L=T[currentLang],category=document.getElementById("categoryFilter"),level=document.getElementById("levelFilter");
  category.innerHTML=`<option value="">${L.allCat}</option>`;
  level.innerHTML=`<option value="">${L.allLvl}</option>`;
  [...new Set(allTerms.map(x=>x.category).filter(Boolean))].forEach(c=>category.innerHTML+=`<option value="${c}">${c}</option>`);
  [...new Set(allTerms.map(x=>x.difficulty_level).filter(Boolean))].forEach(l=>level.innerHTML+=`<option value="${l}">${currentLang==="ar"?levelToArabic(l):l}</option>`);
}
function createAlphabetBar(){
  const letters=["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","هـ","و","ي"];
  const container=document.getElementById("alphabetBar");container.innerHTML="";
  letters.forEach(letter=>{const btn=document.createElement("button");btn.className="letter-btn";btn.innerText=letter;btn.onclick=()=>{location.href=`terms.html?letter=${encodeURIComponent(letter)}`};container.appendChild(btn);});
}
function goToTerms(){
  const q=document.getElementById("searchInput").value.trim(),cat=document.getElementById("categoryFilter").value,lvl=document.getElementById("levelFilter").value;
  location.href=`terms.html?q=${encodeURIComponent(q)}&cat=${encodeURIComponent(cat)}&lvl=${encodeURIComponent(lvl)}`;
}
function toggleLanguage(){
  currentLang=currentLang==="ar"?"en":"ar";const L=T[currentLang];
  document.documentElement.lang=L.lang;document.documentElement.dir=L.dir;document.body.dir=L.dir;
  document.getElementById("langBtn").innerText=L.langBtn;document.getElementById("aboutBtn").innerText=L.about;document.getElementById("themeBtn").innerText=L.theme;
  document.getElementById("mainTitle").innerText=L.title;document.getElementById("mainSubtitle").innerText=L.sub;document.getElementById("termsBtn").innerText=L.terms;
  document.getElementById("aiTitle").innerText=L.ai;document.getElementById("aiQuestion").placeholder=L.aiPH;document.getElementById("sendBtn").innerText=L.send;document.getElementById("aiAnswer").innerText=L.aiDefault;
  document.getElementById("quickSearchTitle").innerText=L.quick;document.getElementById("searchInput").placeholder=L.searchPH;document.getElementById("searchBtn").innerText=L.search;
  populateFilters();
}
function toggleTheme(){document.body.classList.toggle("light")}
function increaseFont(){if(fontSize<24){fontSize+=2;document.documentElement.style.setProperty("--base-font",fontSize+"px")}}
function decreaseFont(){if(fontSize>14){fontSize-=2;document.documentElement.style.setProperty("--base-font",fontSize+"px")}}
loadFilters();
</script>
</body>
</html>
