<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Terms Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--bg:#06140d;--bg2:#0b2418;--card:#10281c;--card2:#143823;--text:#f5fff8;--muted:#c9d8cf;--border:#2f6b49;--accent:#22c55e;--accent2:#86efac;--base-font:18px}
.light{--bg:#f7fff9;--bg2:#eefcf3;--card:#fff;--card2:#f5fff8;--text:#0b1f13;--muted:#26352b;--border:#9fd8b3;--accent:#15803d;--accent2:#166534}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);font-size:var(--base-font);line-height:1.8}
.topbar{position:sticky;top:0;z-index:1000;background:rgba(6,20,13,.85);border-bottom:1px solid var(--border)}
.nav{max-width:1200px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-weight:bold;color:var(--accent2);font-size:22px}
.tools{display:flex;gap:8px;flex-wrap:wrap}
button,a.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#052e13;border:none;padding:11px 16px;border-radius:14px;cursor:pointer;font-weight:bold;text-decoration:none}
.container{max-width:1200px;margin:30px auto;padding:0 20px}
.controls,.stats-box,.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:24px}
.controls{padding:22px;margin-bottom:20px;display:flex;gap:14px;flex-wrap:wrap}
input,select{flex:1;min-width:230px;padding:16px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:18px}
.stats-box{padding:18px;margin-bottom:20px;text-align:center;color:var(--accent2);font-weight:bold}
.alphabet-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:25px}
.letter-btn{min-width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--card),var(--card2));color:var(--text);border:1px solid var(--border)}
.letter-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#052e13}
#termsContainer{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px}
.card{padding:24px;border-right:5px solid var(--accent)}
.card h3{margin:0 0 12px;color:var(--accent2)}
.card p{margin:10px 0;color:var(--muted)}
.card strong{color:var(--text)}
.tag{display:inline-block;border:1px solid var(--accent2);padding:6px 14px;border-radius:30px;margin:5px}
.no-results{grid-column:1/-1;text-align:center;padding:35px;background:var(--card);border-radius:22px}
.modal{display:none;position:fixed;z-index:9999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.75)}
.modal-content{background:#fff;color:#102016;width:85%;max-width:850px;margin:5% auto;padding:28px;border-radius:22px;max-height:85vh;overflow:auto}
.close{float:left;font-size:34px;cursor:pointer;font-weight:bold}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.light .topbar,.light .controls,.light .stats-box,.light .card{background:#fff!important;color:#0b1f13}
.light .card p{color:#26352b}
.light input,.light select{background:#fff;color:#0b1f13}
</style>
</head>
<body>

<div class="topbar">
  <div class="nav">
    <div class="logo" id="pageLogo">🛡️ بطاقات المصطلحات</div>
    <div class="tools">
      <a class="btn" href="index.html" id="homeBtn">الرئيسية</a>
      <a class="btn" href="about.html" id="aboutBtn">عن المشروع</a>
      <button onclick="toggleLanguage()" id="langBtn">English</button>
      <button onclick="exportPDF()" id="pdfBtn">📄 PDF</button>
      <button onclick="toggleTheme()" id="themeBtn">🌙 الوضع</button>
      <button onclick="increaseFont()">A+</button>
      <button onclick="decreaseFont()">A-</button>
    </div>
  </div>
</div>

<div class="container">
<div class="controls">
  <input id="searchInput" type="text" placeholder="🔍 ابحث عن مصطلح...">
  <select id="categoryFilter"><option value="">كل الفئات</option></select>
  <select id="levelFilter"><option value="">كل المستويات</option></select>
</div>
<div class="alphabet-bar" id="alphabetBar"></div>
<div id="stats" class="stats-box">جاري تحميل البيانات...</div>
<div id="termsContainer"></div>
</div>

<div id="termModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwEZR2hd5RJYdmk2mVGLgQjbVpc-28v_Gabhcuk4zvit7tspvyHYJgbrN1UcN0jqGoX/exec";
let allTerms=[],selectedLetter="",fontSize=18,currentLang="ar";
const T={
ar:{dir:"rtl",lang:"ar",logo:"🛡️ بطاقات المصطلحات",home:"الرئيسية",about:"عن المشروع",langBtn:"English",theme:"🌙 الوضع",searchPH:"🔍 ابحث عن مصطلح...",allCat:"كل الفئات",allLvl:"كل المستويات",all:"الكل",loading:"جاري تحميل البيانات...",no:"لا توجد نتائج مطابقة.",displayed:"عدد المصطلحات المعروضة",total:"إجمالي المصطلحات",arabic:"المصطلح بالعربي:",def:"التعريف:",example:"مثال:",solution:"الحل:",risk:"مستوى الخطر:",details:"عرض التفاصيل",copy:"📋 نسخ",copied:"تم نسخ المصطلح",authority:"جهة التواصل:",exp:"مستوى الخبرة:",keywords:"الكلمات المفتاحية:",related:"مصطلحات مرتبطة:",source:"المصدر:"},
en:{dir:"ltr",lang:"en",logo:"🛡️ Terms Cards",home:"Home",about:"About",langBtn:"العربية",theme:"🌙 Theme",searchPH:"🔍 Search for a term...",allCat:"All Categories",allLvl:"All Levels",all:"All",loading:"Loading data...",no:"No matching results.",displayed:"Displayed terms",total:"Total terms",arabic:"Arabic term:",def:"Definition:",example:"Example:",solution:"Solution:",risk:"Risk level:",details:"Details",copy:"📋 Copy",copied:"Term copied",authority:"Contact authority:",exp:"Experience level:",keywords:"Keywords:",related:"Related terms:",source:"Source:"}
};
function levelName(level){if(currentLang==="ar")return level==="beginner"?"للمبتدئين":level==="intermediate"?"خبرة متوسطة":level==="advanced"?"خبرة متقدمة":level||"—";return level||"—"}
function getRiskLevel(category){const c=(category||"").toLowerCase();if(c.includes("attack")||c.includes("هجوم")||c.includes("هجمات"))return currentLang==="ar"?"🔴 عالي":"🔴 High";if(c.includes("threat")||c.includes("malware")||c.includes("تهديد"))return currentLang==="ar"?"🟡 متوسط":"🟡 Medium";if(c.includes("protection")||c.includes("حماية")||c.includes("security"))return currentLang==="ar"?"🟢 منخفض":"🟢 Low";return currentLang==="ar"?"🟡 متوسط":"🟡 Medium"}
function getTermIcon(category){const c=(category||"").toLowerCase();if(c.includes("malware")||c.includes("برمجيات"))return"🦠";if(c.includes("network")||c.includes("شبكات"))return"🌐";if(c.includes("attack")||c.includes("هجوم")||c.includes("هجمات"))return"⚠️";if(c.includes("protection")||c.includes("حماية"))return"🛡️";if(c.includes("encryption")||c.includes("تشفير"))return"🔐";return"📘"}
async function fetchTerms(){const res=await fetch(API_URL),data=await res.json();allTerms=Array.isArray(data)?data:data.data;if(!Array.isArray(allTerms))allTerms=[];populateFilters();createAlphabetBar();readURLParams();applyFilters()}
function populateFilters(){const L=T[currentLang],category=document.getElementById("categoryFilter"),level=document.getElementById("levelFilter");category.innerHTML=`<option value="">${L.allCat}</option>`;level.innerHTML=`<option value="">${L.allLvl}</option>`;[...new Set(allTerms.map(x=>x.category).filter(Boolean))].forEach(c=>category.innerHTML+=`<option value="${c}">${c}</option>`);[...new Set(allTerms.map(x=>x.difficulty_level).filter(Boolean))].forEach(l=>level.innerHTML+=`<option value="${l}">${levelName(l)}</option>`)}
function createAlphabetBar(){const L=T[currentLang],letters=["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","هـ","و","ي"],container=document.getElementById("alphabetBar");container.innerHTML="";const allBtn=document.createElement("button");allBtn.className="letter-btn active";allBtn.innerText=L.all;allBtn.dataset.letter="";allBtn.onclick=()=>setLetter("");container.appendChild(allBtn);letters.forEach(letter=>{const btn=document.createElement("button");btn.className="letter-btn";btn.innerText=letter;btn.dataset.letter=letter;btn.onclick=()=>setLetter(letter);container.appendChild(btn)})}
function readURLParams(){const params=new URLSearchParams(location.search);document.getElementById("searchInput").value=params.get("q")||"";document.getElementById("categoryFilter").value=params.get("cat")||"";document.getElementById("levelFilter").value=params.get("lvl")||"";selectedLetter=params.get("letter")||""}
function setLetter(letter){selectedLetter=letter;document.querySelectorAll(".letter-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.letter===letter));applyFilters()}
function speakEnglish(text){if(!text)return;window.speechSynthesis.cancel();const s=new SpeechSynthesisUtterance(text);s.lang="en-US";s.rate=.85;window.speechSynthesis.speak(s)}
function speakArabic(text){if(!text)return;window.speechSynthesis.cancel();const s=new SpeechSynthesisUtterance(text);s.lang="ar-SA";s.rate=.9;window.speechSynthesis.speak(s)}
function copyTerm(term,definition){navigator.clipboard.writeText(`${term}\n${definition}`);alert(T[currentLang].copied)}
function openModal(index){const item=allTerms[index],L=T[currentLang];document.getElementById("modalBody").innerHTML=`<h2>${getTermIcon(item.category)} ${item.english_term||"—"}</h2><p><strong>${L.arabic}</strong> ${item.arabic_term||"—"}</p><p><strong>${L.def}</strong> ${item.definition_ar||"—"}</p><p><strong>${L.example}</strong> ${item.example_ar||"—"}</p><p><strong>${L.solution}</strong> ${item.solution_ar||"—"}</p><p><strong>${L.authority}</strong> ${item.contact_authori||item.contact_authority||"—"}</p><p><strong>${L.exp}</strong> ${levelName(item.difficulty_level)}</p><p><strong>${L.risk}</strong> ${getRiskLevel(item.category)}</p><p><strong>${L.keywords}</strong> ${item.keywords||"—"}</p><p><strong>${L.related}</strong> ${item.related_terms||"—"}</p><p><strong>${L.source}</strong> ${item.source||"—"}</p>`;document.getElementById("termModal").style.display="block"}
function closeModal(){document.getElementById("termModal").style.display="none"}
function renderTerms(list){const container=document.getElementById("termsContainer"),L=T[currentLang];container.innerHTML="";if(!list.length){container.innerHTML=`<div class="no-results">${L.no}</div>`;return}list.forEach(item=>{const index=allTerms.indexOf(item),english=item.english_term||"—",arabic=item.arabic_term||"—",definition=item.definition_ar||"—",safeEnglish=String(english).replace(/'/g,"\\'"),safeArabic=String(arabic).replace(/'/g,"\\'"),safeDef=String(definition).replace(/'/g,"\\'");container.innerHTML+=`<div class="card"><h3>${getTermIcon(item.category)} ${english}</h3><p><strong>${L.arabic}</strong> ${arabic}</p><p><strong>${L.def}</strong> ${definition}</p><p><strong>${L.example}</strong> ${item.example_ar||"—"}</p><p><strong>${L.solution}</strong> ${item.solution_ar||"—"}</p><p><strong>${L.risk}</strong> ${getRiskLevel(item.category)}</p><p><span class="tag">${levelName(item.difficulty_level)}</span><span class="tag">${item.category||"—"}</span></p><div class="card-actions"><button onclick="openModal(${index})">${L.details}</button><button onclick="copyTerm('${safeEnglish}','${safeDef}')">${L.copy}</button><button onclick="speakEnglish('${safeEnglish}')">🔊 EN</button><button onclick="speakArabic('${safeArabic}')">🔊 AR</button></div></div>`});document.getElementById("stats").innerText=`${L.displayed}: ${list.length} | ${L.total}: ${allTerms.length}`}
function applyFilters(){const search=document.getElementById("searchInput").value.toLowerCase().trim(),category=document.getElementById("categoryFilter").value,level=document.getElementById("levelFilter").value;const filtered=allTerms.filter(item=>{const english=(item.english_term||"").toLowerCase(),arabic=(item.arabic_term||"").toLowerCase(),definition=(item.definition_ar||"").toLowerCase(),keywords=(item.keywords||"").toLowerCase();return(!search||english.includes(search)||arabic.includes(search)||definition.includes(search)||keywords.includes(search))&&(!category||item.category===category)&&(!level||item.difficulty_level===level)&&(!selectedLetter||arabic.startsWith(selectedLetter))});renderTerms(filtered)}
function exportPDF(){html2pdf().from(document.getElementById("termsContainer")).save("Cybersecurity-Terms.pdf")}
function toggleLanguage(){currentLang=currentLang==="ar"?"en":"ar";const L=T[currentLang];document.documentElement.lang=L.lang;document.documentElement.dir=L.dir;document.body.dir=L.dir;document.getElementById("pageLogo").innerText=L.logo;document.getElementById("homeBtn").innerText=L.home;document.getElementById("aboutBtn").innerText=L.about;document.getElementById("langBtn").innerText=L.langBtn;document.getElementById("themeBtn").innerText=L.theme;document.getElementById("searchInput").placeholder=L.searchPH;populateFilters();createAlphabetBar();applyFilters()}
function toggleTheme(){document.body.classList.toggle("light")}
function increaseFont(){if(fontSize<24){fontSize+=2;document.documentElement.style.setProperty("--base-font",fontSize+"px")}}
function decreaseFont(){if(fontSize>14){fontSize-=2;document.documentElement.style.setProperty("--base-font",fontSize+"px")}}
document.getElementById("searchInput").addEventListener("input",applyFilters);
document.getElementById("categoryFilter").addEventListener("change",applyFilters);
document.getElementById("levelFilter").addEventListener("change",applyFilters);
fetchTerms();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
